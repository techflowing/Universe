]

/**
 * 注解处理器
 */
def processor = [
        butterknife: "com.jakewharton:butterknife-compiler:$butterknife",
        glide_apt  : "com.github.bumptech.glide:compiler:${glide_version}",
]

/**
 * Gradle Plugin 插件
 */
def plugin = [

]

/**
 * module 项目
 */
def module = [
        lego  : [
                runtime   : project(":lego:m-runtime"),
                framework : project(":lego:m-framework"),
                splash    : project(":lego:m-splash"),
                cache     : project(":lego:m-cache"),
                permission: project(":lego:m-permission"),
                util      : project(":lego:m-util"),
                scheme    : project(":lego:m-scheme"),
                ui        : project(":lego:m-ui"),
                webview   : project(":lego:m-webview"),
        ],
        plugin: [
                base: project(":gradle-plugin:p-base")
        ]
]

ext.deps = [
        "build"          : build,
        "android"        : android,
        "third"          : third,
        "processor"      : processor,
        "plugin"         : plugin,
        "module"         : module,
        "localProperties": properties
